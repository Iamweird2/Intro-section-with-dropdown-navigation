<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  <link rel="stylesheet" href="css/main.css">
  <title>Frontend Mentor | Intro section with dropdown navigation</title>
  <script defer src="script.js"></script>
  <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
</head>

<body class="relative bg-[#fafafa] text-[18px] text-[#151515] h-[100vh]">
  <div class="header-dropdown  flex flex-row ">
    <header class=" md:basis-[10%] flex flex-row basis-full justify-between p-7 md:justify-start md:inline-block ">
      <img src="images/logo.svg" alt="snap">
      <img class="md:hidden hover:cursor-pointer hover:opacity-50 transition ease-in duration-300 burger"
        src="images/icon-menu.svg" alt="burger">
    </header>

    <div
      class=" md:flex md:flex-row md:px-8 md:gap-16 md:basis-[90%] md:bg-transparent md:h-auto md:w-auto md:relative  md:p-0 dropdown w-[65%] h-[100vh] flex-col hidden z-10 bg-white absolute top-0 right-0 p-6 text-[#808080]">
      <img class="close md:hidden hover:cursor-pointer hover:opacity-50 transition ease-in duration-300 w-6 self-end"
        src="images/icon-close-menu.svg" alt="menu-close">
      <div class="md:flex-row md:mb-0 md:relative hover:cursor-pointer  flex flex-flow flex-wrap items-center  mb-4">
        <span class="mr-3 hover:text-gray-800 transition ease-in duration-300 link">Features</span>
        <img class="arrow-down w-3" src="images/icon-arrow-down.svg" alt="arrow down">
        <img class="arrow-up w-3 hidden" src="images/icon-arrow-up.svg" alt="arrow up">
        <div
          class="content md:shadow-md md:shadow-[#e9e9e9] md:justify-center md:absolute md:top-10 md:w-[200%] md:bg-white md:right-0 md:rounded-xl md:p-2 hidden basis-full mt-5">
          <ul class="md:mx-0 md:w-[80%]  ml-[20%] flex gap-3 flex-col">
            <li>
              <img class="inline-block mr-2 w-[16px]" src="images/icon-todo.svg" alt="todo">
              Todo List
            </li>
            <li>
              <img class="inline-block mr-2 w-[16px]" src="images/icon-calendar.svg" alt="calendar">
              Calendar
            </li>
            <li>
              <img class="inline-block mr-2 w-[16px]" src="images/icon-reminders.svg" alt="reminders">
              Reminders
            </li>
            <li>
              <img class="inline-block mr-2 w-[16px]" src="images/icon-planning.svg" alt="Planning">
              Planning
            </li>
          </ul>
        </div>
      </div>
      <div class="md:flex-row md:mb-0 md:relative hover:cursor-pointer  flex flex-flow flex-wrap items-center  mb-4">
        <span class="mr-3 hover:text-gray-800 transition ease-in duration-300 link">Company</span>
        <img class="arrow-down w-3" src="images/icon-arrow-down.svg" alt="arrow down">
        <img class="arrow-up w-3 hidden" src="images/icon-arrow-up.svg" alt="arrow up">
        <div
          class="content md:shadow-md md:shadow-[#e9e9e9] md:justify-center md:absolute md:top-10 md:w-[150%] md:bg-white md:left-0 md:rounded-xl md:p-2 hidden basis-full mt-5">
          <ul class="md:mx-0 md:w-[80%]  ml-[20%] flex gap-3 flex-col">
            <li>
              History
            </li>
            <li>
              Our Team
            </li>
            <li>
              Blog
            </li>
          </ul>
        </div>
      </div>
      <div class="hover:cursor-pointer md:mb-0 mb-4 flex items-center">
        <span class="mr-3 hover:text-gray-800 transition ease-in duration-300 ">Careers</span>
      </div>
      <div class="hover:cursor-pointer md:mb-0 md:items-center mb-4 flex items-center">
        <span class="mr-3 hover:text-gray-800 transition ease-in duration-300 ">About</span>
      </div>

      <div class="md:ml-auto md:mt-0 hover:cursor-pointer hover:text-gray-800 text-center mt-2 flex items-center">Login
      </div>
      <button
        class="md:hover:bg-transparent md:w-auto md:h-auto md:px-8 md:py-2 md:mt-0 md:mx-0 md:flex md:self-center md:hover:text-black md:hover:border-black w-[80%] mx-auto border-2  hover:bg-[#686868] hover:text-white border-[#686868] text-center py-2 rounded-2xl mt-5 transition ease-in duration-300 ">Register</button>
    </div>
  </div>

  <main class="text-center mb-5 md:text-left md:flex md:p-12 md:mt-7 md:justify-evenly md:items-center">
    <img class="md:hidden w-full mb-8" src="images/image-hero-mobile.png" alt="hero image">
    <img class="md:order-2 md:block md:h-auto md:basis-[30%]  hidden  w-full mb-8" src="images/image-hero-desktop.png"
      alt="hero image">

    <div class="md:basis-[50%]">
      <h1 class="font-bold text-4xl md:text-6xl md:mt-2">Make <span class="block">remote work</span></h1>
      <p class="text-gray-500 p-5 font-medium md:w-[80%] md:px-0 md:my-6 md:text-2xl">
        Get your team in sync, no matter your location. Streamline processes,
        create team rituals, and watch productivity soar.
      </p>
      <button
        class="md:mb-20 py-3 px-6 rounded-2xl bg-[#151515] text-white text-center mb-8 transition ease-in duration-300 hover:bg-transparent hover:text-[#151515] border-2 border-transparent hover:border-[#151515]">Learn
        more</button>
      <div class="w-full px-4 flex flex-row justify-between items-center">
        <div class="basis-[20%]"><img src="images/client-databiz.svg" alt="databiz"></div>
        <div class="basis-[20%]"><img src="images/client-audiophile.svg" alt="autophile"></div>
        <div class="basis-[20%]"><img src="images/client-meet.svg" alt="meet"></div>
        <div class="basis-[20%]"><img src="images/client-maker.svg" alt="maker"></div>
      </div>
    </div>
  </main>
</body>

</html>
